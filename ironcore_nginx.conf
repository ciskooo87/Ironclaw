server {
    listen 80;
    server_name ironcore.lat www.ironcore.lat;

    location = / {
        return 200 "IRONCORE - Deploy em andamento\n";
        add_header Content-Type text/plain;
    }

    location = /app {
        return 301 /app/;
    }

    # Protected app shell
    location /app/ {
        auth_basic "Ironcore Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd_ironcore_app;

        proxy_pass http://127.0.0.1:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Next.js static assets requested as /_next/*
    location /_next/ {
        auth_basic "Ironcore Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd_ironcore_app;

        proxy_pass http://127.0.0.1:3001/_next/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /favicon.ico {
        auth_basic "Ironcore Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd_ironcore_app;

        proxy_pass http://127.0.0.1:3001/favicon.ico;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}
